version: '3'

services:
  telemirror:
    image: sybernorth/mirror_yelp:774
    restart: unless-stopped
    environment:
      API_ID: ${API_ID}
      API_HASH: ${API_HASH}
      SESSION_STRING: ${SESSION_STRING}
      CHAT_MAPPING: ${CHAT_MAPPING}
      LOG_LEVEL: ${LOG_LEVEL}
      MODE: ${MODE:-forward}  # Default to forward mode
      REPEAT_INTERVAL: ${REPEAT_INTERVAL}
    env_file:
      - .env
    volumes:
      - ./.configs:/app/.configs:ro
    ports:
      - "${PORT_API}:8000"
